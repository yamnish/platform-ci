          docker build --target gitleaks -t ghcr.io/${{ github.repository_owner }}/linter-gitleaks:latest linters/
          docker push ghcr.io/${{ github.repository_owner }}/linter-gitleaks:latest

  build-dotenv:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
