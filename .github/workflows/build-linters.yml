name: Build linter images

on:
  push:
    paths:
      - linters/**
  workflow_dispatch:

jobs:
  build-shellcheck:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push shellcheck image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/linter-shellcheck:latest linters/shellcheck/
          docker push ghcr.io/${{ github.repository_owner }}/linter-shellcheck:latest

  build-hadolint:
    runs-on: [self-hosted, linux, x64]
