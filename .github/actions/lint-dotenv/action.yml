name: Lint - dotenv-linter
description: Run dotenv-linter on .env.example files

runs:
  using: composite
  steps:
    - name: Run dotenv-linter
      shell: bash
      run: |
        files=$(find . \( -name '*.env.example' -o -name '.env.example' \) -not -path './.git/*')
        if [ -z "$files" ]; then
          echo "No .env.example files found, skipping."
          exit 0
        fi
        while IFS= read -r f; do
          docker run --rm \
            -v "$(pwd):/workdir" \
            -w /workdir \
            ghcr.io/yamnish/linter-dotenv:latest \
            check "$f"
        done <<< "$files"
