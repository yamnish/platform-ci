name: Lint - JSON
description: Validate all .json files with jq

runs:
  using: docker
  image: docker://ghcr.io/yamnish/linter-jq:latest
  entrypoint: /bin/sh
  args:
    - -c
    - |
      failed=0
      find /github/workspace -name "*.json" -not -path "*/.git/*" | while read -r f; do
        if jq . "$f" > /dev/null 2>&1; then
          echo "OK: $f"
        else
          echo "FAIL: $f"
          failed=1
        fi
      done
      exit $failed
