name: Lint - markdownlint
description: Run markdownlint on all .md files

runs:
  using: docker
  image: docker://ghcr.io/yamnish/linter-markdownlint:latest
  entrypoint: /bin/sh
  args:
    - -c
    - "find /github/workspace -name '*.md' -not -path '*/.git/*' | xargs -r markdownlint --disable MD013 MD033 MD034 MD041 --"
